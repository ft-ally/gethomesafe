<!DOCTYPE html>

<html lang="en">
	<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>GetHomeSafe</title> 
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
</head>

<body>
    <header>
        <a href="/" class="logo" alt="GetHomeSafe" id="header-logo" /> 
        </a>
    </header>
	
	<div class="map-container">
        <div id="map"></div>
    </div>
    
	<aside class="sidebar">
		<div id="welcome-message" class="welcome-message">
			<h2>Because we just want to get home safe.</h2>
			<h3>Don't you?</h3>
			<button id="get-started-btn" class="get-started-btn">→</button>
		</div>
		<div id="sidebar-content" class="sidebar-content hidden">
			<div id="top-message" class="top-message">
				<h1>Find the safe route to anywhere</h1>
			</div>
			<div class="divider">
			</div>
			<div class="origin-section">
				<h3>Where from?</h3>
				<h4>Add your location on the search bar, use your current location, or pin on the map</h4>
				<div class="search-bar">
					<input
					type="text"
					id="origin-input"
					class="search-bar"
					placeholder="Search for your location..."
					/>
					<button id="use-loc" class="primary-btn" data-tooltip="Use your current location">📍</button>
					<button id="search-btn" class="primary-btn" data-tooltip="Search">🔍</button>
				</div>
			</div>
			<div class="divider">
			</div>
			<div class="destination-section">
				<h3>Where to?</h3>
				<h4>Add your destination on the search bar or place multiple pins on the map</h4>

				<div class="search-bar">
					<input
						type="text"
						id="search-input"
						class="search-bar"
						placeholder="Search for your destination..."
					/>
					<button id="add-loc" class="primary-btn" data-tooltip="Add another destination">＋</button>
					<button id="search-btn2" class="primary-btn" data-tooltip="Search">🔍</button>
				</div>
			</div>
			<div class="divider">
			</div>
			<button id="get-started-btn" class="get-started-btn">Take me there</button>

		</div>
	</aside>
	<script type="module" src="js/app.js"></script>
</body>
</html>
