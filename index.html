<!DOCTYPE html>

<html lang="en">
	<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>GetHomeSafe</title> 
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <a href="/"> 
            <img src="assets/logo.png" alt="GetHomeSafe" class="logo" id="header-logo" /> 
        </a>
    </header>
	<div class="map-container">
        <div id="map"></div>
    </div>
    <aside class = "sidebar">
	<div class="welcome">
		<h2>Because we just want to get home safe.</h2>
		<p>Enter your origin, or turn on your geolocation </p>
	</div>
		<div class="origin-section">
			<h3> Where from: </h3>
				<button id="use-location" class="primary-btn">
				📍 Use my location 
			</button> 
			<div id="origin-box" class="location-box empty">
				<p class="empty-state"> Click on Map to set origin</p>
			</div>
		</div>
		<div class="destinations-section">
			<h3>Where to:</h3>
			<div id="destinations-list">
			</div>
		</div>
	</aside>
    
    
    <script type="module" src="js/app.js"></script>
</body>
</html>
